<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submissions | MappingTrace</title>
    
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Your CSS files from parent folder -->
    <link rel="stylesheet" href="../globalCSS.css">
    <link rel="stylesheet" href="../layoutCSS.css">
    <link rel="stylesheet" href="../tableCSS.css">
    
    <!-- Submissions CSS -->
    <link rel="stylesheet" href="submissions.css">
    
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">
    
    <style>
        /* Modal with map styling */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            width: 90%;
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            padding: 20px;
            background: #2c3e50;
            color: white;
            border-radius: 12px 12px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1;
        }

        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            transition: opacity 0.3s;
        }

        .modal-close:hover {
            opacity: 0.8;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-section {
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
        }

        .modal-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .modal-section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-row {
            display: flex;
            margin-bottom: 12px;
        }

        .modal-label {
            width: 150px;
            font-weight: 600;
            color: #666;
        }

        .modal-value {
            flex: 1;
            color: #333;
        }

        /* Map container */
        #submissionMap {
            height: 400px;
            border-radius: 8px;
            margin-top: 10px;
            border: 1px solid #ddd;
        }

        .map-info {
            margin-top: 10px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 12px;
            color: #666;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .modal-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .modal-btn.approve {
            background: #4CAF50;
            color: white;
        }

        .modal-btn.approve:hover {
            background: #45a049;
        }

        .modal-btn.reject {
            background: #F44336;
            color: white;
        }

        .modal-btn.reject:hover {
            background: #da190b;
        }

        .modal-btn.cancel {
            background: #ccc;
            color: #333;
        }

        .modal-btn.cancel:hover {
            background: #bbb;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-badge.pending {
            background: #FFF3E0;
            color: #FF9800;
        }

        .status-badge.validated,
        .status-badge.approved {
            background: #E8F5E9;
            color: #4CAF50;
        }

        .status-badge.rejected {
            background: #FFEBEE;
            color: #F44336;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 6px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .action-btn.view {
            background: #2196F3;
            color: white;
        }

        .action-btn.view:hover {
            background: #0b7dda;
        }

        .action-btn.validate {
            background: #4CAF50;
            color: white;
        }

        .action-btn.validate:hover {
            background: #45a049;
        }

        .action-btn.reject {
            background: #F44336;
            color: white;
        }

        .action-btn.reject:hover {
            background: #da190b;
        }

        .sync-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .sync-btn:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <div class="layout">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>
                    <i class="fas fa-map-marked-alt"></i>
                    <span>MappingTrace</span>
                </h2>
            </div>
            <nav class="menu">
                <a href="../Dashboard.html">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Dashboard</span>
                </a>
                <a href="../LiveMapping/live-mapping.html">
                    <i class="fas fa-map"></i>
                    <span>Live Mapping</span>
                </a>
                <a href="#" class="active">
                    <i class="fas fa-clipboard-list"></i>
                    <span>Submissions</span>
                </a>
                <a href="../QualityAlerts/quality-alerts.html">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span>Quality Alerts</span>
                </a>
                <a href="../Exports/exports.html">
                    <i class="fas fa-file-export"></i>
                    <span>Exports</span>
                </a>
                <div class="menu-bottom">
                    <a href="#" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Logout</span>
                    </a>
                </div>
            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main">
            <!-- HEADER -->
            <div class="main-header">
                <div class="header-title">
                    <h1><i class="fas fa-clipboard-list"></i> Submissions</h1>
                    <div class="breadcrumb">Home / Submissions</div>
                </div>
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">FK</div>
                    <div class="user-details">
                        <div class="user-name" id="userName">Loading...</div>
                        <div class="user-role" id="userRole">Loading...</div>
                    </div>
                    <button class="sync-btn" id="refreshBtn">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                </div>
            </div>

            <!-- SUBMISSIONS CONTENT -->
            <div class="submissions-container">
                <!-- FILTERS SECTION -->
                <div class="filters-section">
                    <div class="filter-group">
                        <div class="filter-search-container">
                            <i class="fas fa-search search-icon"></i>
                            <input type="text" id="supplierSearchInput" class="filter-search" placeholder="Search suppliers...">
                        </div>
                        <select id="supplierFilter" class="filter-select">
                            <option value="all">All Suppliers</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <div class="filter-search-container">
                            <i class="fas fa-search search-icon"></i>
                            <input type="text" id="coopSearchInput" class="filter-search" placeholder="Search cooperatives...">
                        </div>
                        <select id="cooperativeFilter" class="filter-select">
                            <option value="all">All Cooperatives</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <input type="text" id="searchInput" class="search-box" placeholder="Search by name or ID...">
                    </div>
                    
                    <div class="filter-group">
                        <select id="statusFilter" class="filter-select">
                            <option value="all">All Status</option>
                            <option value="approved">Approved</option>
                            <option value="validated">Validated</option>
                            <option value="pending">Pending</option>
                            <option value="rejected">Rejected</option>
                        </select>
                    </div>
                    
                    <button id="toggleViewBtn" class="toggle-view-btn">
                        <i class="fas fa-layer-group"></i> Group View
                    </button>
                </div>

                <!-- STATS SECTION -->
                <div class="stats-section">
                    <div class="stat-card pending">
                        <i class="fas fa-clock"></i>
                        <span class="stat-number" id="pendingCount">0</span>
                        <span class="stat-label">Pending</span>
                    </div>
                    <div class="stat-card validated">
                        <i class="fas fa-check-circle"></i>
                        <span class="stat-number" id="validatedCount">0</span>
                        <span class="stat-label">Validated</span>
                    </div>
                    <div class="stat-card rejected">
                        <i class="fas fa-times-circle"></i>
                        <span class="stat-number" id="rejectedCount">0</span>
                        <span class="stat-label">Rejected</span>
                    </div>
                    <div class="stat-card total">
                        <i class="fas fa-tractor"></i>
                        <span class="stat-number" id="totalCount">0</span>
                        <span class="stat-label">Total</span>
                    </div>
                </div>

                <!-- TABLE VIEW -->
                <div id="tableView" class="table-view">
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th data-sort="farmerId">Farmer ID <i class="fas fa-sort"></i></th>
                                    <th data-sort="farmerName">Farmer Name <i class="fas fa-sort"></i></th>
                                    <th data-sort="cooperative">Cooperative <i class="fas fa-sort"></i></th>
                                    <th data-sort="supplier">Supplier <i class="fas fa-sort"></i></th>
                                    <th data-sort="area">Area (ha) <i class="fas fa-sort"></i></th>
                                    <th data-sort="status">Status <i class="fas fa-sort"></i></th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody">
                                <tr>
                                    <td colspan="7" style="text-align: center; padding: 40px;">Loading submissions...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <div class="pagination-container">
                        <div class="pagination-info">
                            Showing <span id="showingStart">0</span> - <span id="showingEnd">0</span> of <span id="totalRecords">0</span>
                        </div>
                        <div class="pagination-controls">
                            <button id="prevPageBtn" class="page-btn" disabled>
                                <i class="fas fa-chevron-left"></i>
                            </button>
                            <div id="pageNumbers" class="page-numbers"></div>
                            <button id="nextPageBtn" class="page-btn">
                                <i class="fas fa-chevron-right"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- GROUP VIEW -->
                <div id="groupView" class="group-view" style="display: none;">
                    <div id="groupViewContent"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="submissions.js"></script>
</body>
</html>
