<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submissions | MappingTrace</title>
    
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="submissions.css">
</head>
<body>
    <div class="layout">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>
                    <i class="fas fa-map-marked-alt"></i>
                    <span>MappingTrace</span>
                </h2>
            </div>
            <nav class="menu">
                <a href="../Dashboard.html">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Dashboard</span>
                </a>
                <a href="../LiveMapping/live-mapping.html">
                    <i class="fas fa-map"></i>
                    <span>Live Mapping</span>
                </a>
                <a href="#" class="active">
                    <i class="fas fa-clipboard-list"></i>
                    <span>Submissions</span>
                </a>
                <a href="../QualityAlerts/quality-alerts.html">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span>Quality Alerts</span>
                </a>
                <a href="../Exports/exports.html">
                    <i class="fas fa-file-export"></i>
                    <span>Exports</span>
                </a>
                <div class="menu-bottom">
                    <a href="#" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Logout</span>
                    </a>
                </div>
            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main">
            <!-- HEADER -->
            <div class="main-header">
                <div class="header-title">
                    <h1><i class="fas fa-clipboard-list"></i> Submissions</h1>
                    <div class="breadcrumb">Home / Submissions</div>
                </div>
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">FK</div>
                    <div class="user-details">
                        <div class="user-name" id="userName">Loading...</div>
                        <div class="user-role" id="userRole">Loading...</div>
                    </div>
                    <button class="sync-btn" id="refreshBtn">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                </div>
            </div>

            <!-- SUBMISSIONS CONTENT -->
            <div class="submissions-container">
                <!-- FILTERS SECTION -->
                <div class="filters-section">
                    <div class="filter-group">
                        <div class="filter-search-container">
                            <i class="fas fa-search search-icon"></i>
                            <input type="text" id="supplierSearchInput" class="filter-search" placeholder="Search suppliers...">
                        </div>
                        <select id="supplierFilter" class="filter-select">
                            <option value="all">All Suppliers</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <div class="filter-search-container">
                            <i class="fas fa-search search-icon"></i>
                            <input type="text" id="coopSearchInput" class="filter-search" placeholder="Search cooperatives...">
                        </div>
                        <select id="cooperativeFilter" class="filter-select">
                            <option value="all">All Cooperatives</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <input type="text" id="searchInput" class="search-box" placeholder="Search by name or ID...">
                    </div>
                    
                    <div class="filter-group">
                        <select id="statusFilter" class="filter-select">
                            <option value="all">All Status</option>
                            <option value="approved">Approved</option>
                            <option value="pending">Pending</option>
                            <option value="rejected">Rejected</option>
                        </select>
                    </div>
                    
                    <button id="toggleViewBtn" class="toggle-view-btn">
                        <i class="fas fa-layer-group"></i> Group View
                    </button>
                </div>

                <!-- STATS SECTION -->
                <div class="stats-section">
                    <div class="stat-card pending">
                        <i class="fas fa-clock"></i>
                        <span class="stat-number" id="pendingCount">0</span>
                        <span class="stat-label">Pending</span>
                    </div>
                    <div class="stat-card validated">
                        <i class="fas fa-check-circle"></i>
                        <span class="stat-number" id="validatedCount">0</span>
                        <span class="stat-label">Validated</span>
                    </div>
                    <div class="stat-card rejected">
                        <i class="fas fa-times-circle"></i>
                        <span class="stat-number" id="rejectedCount">0</span>
                        <span class="stat-label">Rejected</span>
                    </div>
                    <div class="stat-card total">
                        <i class="fas fa-tractor"></i>
                        <span class="stat-number" id="totalCount">0</span>
                        <span class="stat-label">Total</span>
                    </div>
                </div>

                <!-- TABLE VIEW -->
                <div id="tableView" class="table-view">
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th data-sort="farmerId">Farmer ID <i class="fas fa-sort"></i></th>
                                    <th data-sort="farmerName">Farmer Name <i class="fas fa-sort"></i></th>
                                    <th data-sort="cooperative">Cooperative <i class="fas fa-sort"></i></th>
                                    <th data-sort="supplier">Supplier <i class="fas fa-sort"></i></th>
                                    <th data-sort="area">Area (ha) <i class="fas fa-sort"></i></th>
                                    <th data-sort="status">Status <i class="fas fa-sort"></i></th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody">
                                <tr>
                                    <td colspan="7" style="text-align: center; padding: 40px;">Loading submissions...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <div class="pagination-container">
                        <div class="pagination-info">
                            Showing <span id="showingStart">0</span> - <span id="showingEnd">0</span> of <span id="totalRecords">0</span>
                        </div>
                        <div class="pagination-controls">
                            <button id="prevPageBtn" class="page-btn" disabled>
                                <i class="fas fa-chevron-left"></i>
                            </button>
                            <div id="pageNumbers" class="page-numbers"></div>
                            <button id="nextPageBtn" class="page-btn">
                                <i class="fas fa-chevron-right"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- GROUP VIEW -->
                <div id="groupView" class="group-view" style="display: none;">
                    <div id="groupViewContent"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="submissions.js"></script>
</body>
</html>
