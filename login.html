<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | MappingTrace</title>
    
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- ✅ CRITICAL: Load config.js FIRST -->
    <script src="config.js"></script>
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="globalCSS.css">
    
    <style>
        /* Your registration page styles here */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            padding: 20px;
        }
        
        .auth-container {
            max-width: 480px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .auth-header {
            background: linear-gradient(135deg, #2c6e49 0%, #4CAF50 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        .auth-header i {
            font-size: 56px;
            margin-bottom: 15px;
        }
        
        .auth-header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .auth-header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .auth-body {
            padding: 40px 30px;
            background: white;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2d3748;
            font-size: 14px;
        }
        
        .form-group label i {
            margin-right: 8px;
            color: #2c6e49;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }
        
        .form-group input:focus, .form-group select:focus {
            border-color: #2c6e49;
            outline: none;
            box-shadow: 0 0 0 4px rgba(44, 110, 73, 0.1);
        }
        
        .password-field {
            position: relative;
        }
        
        .password-field input {
            padding-right: 45px;
        }
        
        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #718096;
        }
        
        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2c6e49 0%, #4CAF50 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(44, 110, 73, 0.3);
        }
        
        .auth-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #edf2f7;
        }
        
        .auth-footer a {
            color: #2c6e49;
            text-decoration: none;
            font-weight: 600;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            color: white;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }
        
        .notification-success { background: linear-gradient(135deg, #4CAF50, #45a049); }
        .notification-error { background: linear-gradient(135deg, #F44336, #d32f2f); }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <i class="fas fa-user-plus"></i>
            <h1>Create Account</h1>
            <p>Join MappingTrace today</p>
        </div>
        
        <div class="auth-body">
            <form id="registerForm">
                <div class="form-group">
                    <label for="fullName">
                        <i class="fas fa-user"></i>
                        Full Name
                    </label>
                    <input type="text" id="fullName" placeholder="Enter your full name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i>
                        Email Address
                    </label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i>
                        Password
                    </label>
                    <div class="password-field">
                        <input type="password" id="password" placeholder="Create a password" required>
                        <i class="fas fa-eye password-toggle" onclick="togglePassword('password', this)"></i>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">
                        <i class="fas fa-check-circle"></i>
                        Confirm Password
                    </label>
                    <div class="password-field">
                        <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                        <i class="fas fa-eye password-toggle" onclick="togglePassword('confirmPassword', this)"></i>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="role">
                        <i class="fas fa-briefcase"></i>
                        Role
                    </label>
                    <select id="role">
                        <option value="field_officer">Field Officer</option>
                        <option value="validator">Validator</option>
                        <option value="viewer">Viewer</option>
                    </select>
                </div>
                
                <button type="submit" class="auth-btn" id="registerBtn">
                    <i class="fas fa-user-plus"></i>
                    <span>Create Account</span>
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Sign In</a></p>
            </div>
        </div>
    </div>
    
    <div id="notificationContainer"></div>
    
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Supabase Initialization -->
    <script>
        (function() {
            'use strict';
            
            console.log('🔧 Initializing Supabase...');
            
            if (!window.CONFIG) {
                console.error('❌ CONFIG is not loaded!');
                return;
            }
            
            function initSupabase() {
                if (typeof window.supabase === 'undefined') {
                    setTimeout(initSupabase, 100);
                    return;
                }
                
                try {
                    const SUPABASE_URL = window.CONFIG.SUPABASE_URL;
                    const SUPABASE_ANON_KEY = window.CONFIG.SUPABASE_ANON_KEY;
                    
                    if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
                        console.error('❌ Missing credentials');
                        return;
                    }
                    
                    window.supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    console.log('✅ Supabase initialized');
                } catch (err) {
                    console.error('❌ Init failed:', err);
                    setTimeout(initSupabase, 1000);
                }
            }
            
            initSupabase();
        })();
    </script>
    
    <!-- Registration Script -->
    <script>
        // Notification System
        const notification = {
            show: function(message, type) {
                const container = document.getElementById('notificationContainer');
                if (!container) return;
                
                const notif = document.createElement('div');
                notif.className = `notification notification-${type}`;
                notif.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i><span>${message}</span>`;
                container.appendChild(notif);
                
                setTimeout(() => notif.remove(), 3000);
            },
            success: (msg) => notification.show(msg, 'success'),
            error: (msg) => notification.show(msg, 'error')
        };
        
        // Password Toggle
        window.togglePassword = function(fieldId, icon) {
            const field = document.getElementById(fieldId);
            if (field.type === 'password') {
                field.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                field.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        };
        
        // Registration Handler
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (!window.supabase) {
                notification.error('Supabase not ready. Please refresh.');
                return;
            }
            
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const role = document.getElementById('role').value;
            const registerBtn = document.getElementById('registerBtn');
            
            // Validation
            if (!fullName || !email || !password) {
                notification.error('Please fill all fields');
                return;
            }
            
            if (password !== confirmPassword) {
                notification.error('Passwords do not match');
                return;
            }
            
            if (password.length < 6) {
                notification.error('Password must be at least 6 characters');
                return;
            }
            
            registerBtn.disabled = true;
            registerBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';
            
            try {
                const { data, error } = await window.supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            full_name: fullName,
                            role: role
                        }
                    }
                });
                
                if (error) throw error;
                
                notification.success('Account created! Please check your email for verification.');
                setTimeout(() => {
                    window.location.href = 'login.html?registered=true';
                }, 2000);
                
            } catch (error) {
                notification.error(error.message);
                registerBtn.disabled = false;
                registerBtn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
            }
        });
    </script>
</body>
</html>
